upstream frontend {
    server frontend-green:80;
}

upstream backend {
    server backend-green:5000;
}

server {

    listen 80;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}